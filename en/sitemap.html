	<script>//Test script, displays viewport dimensions. remove before upload.
		function viewportSize(){
		  if(window.innerWidth !== undefined && window.innerHeight !== undefined) { 
			var w = window.innerWidth;
			var h = window.innerHeight;
		  } else {  
			var w = document.documentElement.clientWidth;
			var h = document.documentElement.clientHeight;
		  }
		  var txt = "Page size: width=" + w + "px, height=" + h + "px";
		  document.getElementById("viewportSize").innerHTML = txt;
		}
	</script>



    <script>// This code is used to remember theme selection between page loads
      const themeSwitch = document.querySelector('.theme-switch');
      themeSwitch.checked = localStorage.getItem('switchedTheme') === 'true';

      themeSwitch.addEventListener('change', function(e) {
        if (e.currentTarget.checked === true) {
          // Add item to localstorage
          localStorage.setItem('switchedTheme', 'true');
        } else {
          // Remove item if theme is switched back to normal
          localStorage.removeItem('switchedTheme');
        }
      });
    </script>
