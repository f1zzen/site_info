# Регламент о должностях, процессах и оценке ущерба

## 1. Общий свод

- 1.0. Администрация оставляет за собой право изменить действующий регламент в любой момент, но обязана оповестить людей в канале `〢📢・объявления`.
- 1.1. Все должности делятся на уровень доступа (также можно использовать такие термины как *"права доступа"*, *"уровень"* и другие подобные, *далее — уровень доступа*). 
- 1.2. Уровень доступа начинается с нуля.
- 1.3. Администрация обладает **нулевым** доступом, что ставит её превыше всех.
- 1.4. Основные должности представляют: **Центрат**, **Судья** и **Президент**. Они представляют собой **первый доступ**.
- 1.5. Лица равного уровня доступа не имеют права отстранять от должности лиц аналогичного статуса.
- 1.6. Для жалоб на гос. служащих необходимо обратиться к администрации в тикеты, заполнив документ по следующим правилам:

```
Я, игрок [ваш никнейм], заявляю о том, что [ник обвиняемого] должен быть (снят с текущей должности)/(понести наказание) по следующим причинам:

- [перечисление причин]

Я подтверждаю, что все приведенные выше утверждения верны, содержат объективные факты и подкреплены доказательствами. В случае предоставления недостоверных сведений я готов понести ответственность.
```

Требования к содержанию:

- Указание на **объективные** нарушения, подкрепленные видео, скриншотами или иными доказательствами.
- Отсутствие **субъективной оценки** и **личного отношения** ("Он мне не нравится", "Он меня оскорбил" и так далее).

Все предоставленные факты подлежат строгой проверке. Если в ходе разбирательства будет установлено, что заявляющий:

- Скрыл важные обстоятельства (например, о том что была договорённость)
- Предоставил заведомо ложные сведения.
- Подал жалобу в личных целях (из мести, обиды или выгоды)

Администрация оставляет за собой право **исключить заявляющего из должности**, **вынести штраф** или применить **любое другое наказание** в зависимости от серьёзности обвинений.

- 1.7. Государственные должности имеют право работать между собой и согласовывать проекты. *(как тому пример - Президент и Центрат о согласовании общей картины спавна)*
- 1.8. Должности первого уровня доступа за месяц работы получают базовую выплату до 360 часиков (сумма может быть увеличена за счет премий).
1.8.1. Если игрок за время нахождения на должности, по мнению Администрации, не проявил достаточной активности, его выплата за месяц составляет 0 часиков.
- 1.8.2. Если игрок был досрочно снят с должности за небрежное выполнение обязанностей, его заслуженная выплата уменьшается вдвое. Пример: если игрок отработал на 90 часиков, то при увольнении он получит только 45 часиков.
- 1.8.3. Если игрок работал добросовестно, соблюдал правила и своевременно решал все поступающие задачи, он получает 360 часиков.
- 1.8.4. Если игрок проявляет высокую активность и перевыполняет свои обязанности, Администрация может поощрить его премией в размере от 50 до 250 часиков.
- 1.8.5. Итоговый размер выплаты определяется Администрацией на основе совокупности факторов: общего онлайна, качества выполнения работы, количества закрытых дел/проектов и отсутствия дисциплинарных нарушений. Но опять же, **зарплата высчитывается по общему мнению администрации**.

## 2. Центрат

- 2.1. Центрат является руководителем спавна, управляющим общим стилем спавна и постройками на спавне. 
- 2.2. Если здание предлагается убрать *(снести)*, то центрату необходимо предупредить игрока и выделить ему срок на 3 дня. Игрок **должен** увидеть предупреждение и ответить на него **или** оставить любую реакцию, подтверждающую то, что игроком сообщение было увидено. Если в течение 3 дней игрок не предоставил ответ, то снос производится с сохранением каждого ресурса и перекладывая его в сундуки, называя каждый сундук табличкой с именем владельца здания.
- 2.3. Если владелец здания неизвестен, центрат обязан посмотреть кто занимался строительством здания через `/co i` и отписать человеку, дожидаясь ответа по пункту 2.2.
- 2.4. Центрат имеет право не ожидать три дня, если с игроком заранее была достигнута договоренность о моментальном сносе. Условия должны быть высказаны понятно, просто и кратко. Центрат всё ещё обязан складывать ресурсы из здания в сундук.
- 2.5. Территория спавна описывается в виде круга с радиусом **300 блоков**. Если сложно, то можно попробовать понять через иллюстрацию:

![иллюстрация квадратэкэ](spawn.png)

- Чёрным обозначена территория центрата. Она является **круглой**, не квадратной. Диаметром будет 2R, или же 600 блоков. 
- Большим тёмно-красным квадратом обозначена просто квадратная территория со сторонами 600 блоков каждая. 
- Красными квадратами обозначается территория **НЕ ПРИНАДЛЕЖАЩАЯ** центрату. В нашем случае территория, выходящая за квадрат.
- Чтобы проверить, находится ли территория за пределами спавна, можно воспользоваться формулой: x² + z² ≟ R². Если первая часть больше второй (то есть x² + z² > R²), то территория находится **вне** спавна. В противном случае постройка находится внутри спавна.

## 3. Процесс суда и судья

- 3.1. Судья является человеком, отвечающим за правосудие на сервере. В основном судья должен руководствоваться логикой и основываться на прошлых вердиктах.
- 3.2. Судья имеет право передать дело администрации, если дело касается внезапных, необъяснимых или решаемых **только** с помощью администрации решений.
- 3.3. Судья обязан проводить слушание **исключительно** в двух местах: трибуна (дискорд-канал) или в ветке внутри форума `〢⚖️・суд`. Однако судья оставляет за собой право провести очный суд в игре с записью полного процесса.
- 3.4. Штраф выписывается исключительно за счёт общего ущерба и нарушения правил. 
- 3.4.1. Таблички, требующие алмазов с игроков за вход на частную территорию, являются недействительными и не должны учитываться при осмотре дела.
- 3.4.2. Если была украдена незеритовая броня, то с игрока должны требовать идентичную броню и компенсацию. 
- 3.4.3. Если были украдены разные ресурсы, например `5 железных слитков, 7 слизи, 2 алмазных меча и 8 алмазов`, то учитывается сложность получения этих ресурсов и себестоимость. Здесь 2 меча можно расценить как 5 аров, ведь на крафт одного меча уходит 2 алмаза, а палки оцениваются как 1 АР (из-за лёгкости добычи). Железные слитки можно оценить в 2-3 АРа, а слизь является не особо сложным предметом, но общая сумма штрафа будет варьироваться в размере от 16 до 21 АР.
- 3.4.4. За введение в заблуждение суда, выдачу ложных фактов или любые другие процессуальные нарушения необходим штраф в зависимости от тяжести нарушений.
- 3.5. "Лишение голоса" (мут), бан или любые другие наказания, влияющие на игрока, должны быть предоставлены администрацией. Примеры:
```text
1. Откат ресурсов новичком (игрок, чья разница во времени с моментом нарушения и первым заходом составляет менее 16 часов) после внезапного, моментального грифа
2. Бан, бан-айпи, мут или любое другое подобное наказание
```
- 3.5.1. Судья после вынесения решения обязан оповестить администрацию о том, что наказание/решение должно быть выполнено администрацией.
- 3.6. Судья обязан соблюдать пункт **3.1** и руководствоваться **логикой**. Судья **не должен** выдавать очевидно огромный штраф за маленькое нарушение, или наоборот - освобождать человека за тяжкие преступления. **Не доводить вердикты до абсурда**.
- 3.7. Судья обязан описать свой вердикт одним сообщением, включив в него итоговое наказание лицам, объяснения наказания и по необходимости оповещение администрации при сложных ситуациях.
- 3.8. Судье **запрещено** вставать на чью-либо сторону, не выслушав обе позиции. **Судья должен быть объективен и нейтрален к каждому в ходе процесса.**
- 3.9. Игроки в ходе процесса обязаны соблюдать правила, описанные в дискорд канале. Любые провокации, оскорбления и проявления неуважения к судье могут стать поводом отклонить ваше дело или наоборот, уменьшить шансы на победу в суде. Даже если вы окажетесь правы.
- 3.10. Игроки в ходе процесса обязаны предоставлять аргументы на каждое свое заявление (другими словами - в суде действует *бремя доказывания*). 
- 3.11. В отличие от реальной судебной практики, любая лживая информация (если она будет признана таковой) будет учитываться в итоговом вердикте, что может повлиять на итоговое наказание. Например, попытка обвинить человека в чём-то серьёзном вместо реального нарушения может влечь за собой штраф. В это же правило входят умышленные подмены понятий и искажение фактов, переход на личности, перевод обсуждения на темы (не относящиеся к предмету иска) или эмоциональное давление на игроков.
- 3.12. Судья имеет право вынести решение без слушания другой стороны, если в ходе процесса выяснилось, что:

```text
1. Обвиняемый оказался твинком (альтернативным аккаунтом) нарушителя.
2. Обвиняемый совершил преступление в первые 24 часа игры на сервере (учитывается время после первого захода на сервер, не общее время игры).
3. Обвиняемый игнорирует суд и не желает участвовать в этом деле. На ответ даётся 24 часа.
4. Или в любой другой ситуации, где контакт с обвиняемым просто невозможен.
```
- 3.13. В процесс не должны вмешиваться другие люди (помимо случаев регулируемого оффтопа). Исключением является дача показаний свидетелями, но только если этого требует сам судебный процесс.
- 3.14. Судья имеет право потребовать от лиц, мешающих делу, тишины или молчания. Если же после двух предупреждений человек продолжает мешать делу, администрация отстраняет человека в мут/бан на временный срок, который в основном не превышает 12 часов.
- 3.15. Игрок имеет право подать апелляцию, если не согласен с итоговым решением. 
- 3.16. Апелляция делится на два этапа: Судебная и Верховная. 
- 3.17. **Верховная** апелляция пишется только в том случае, если вам отказали на **Судебной** и наоборот - **Судебная** пишется до **Верховной** апелляции.
- 3.18. Судебная апелляция представляет из себя апелляцию, адресованную президенту и второму судье. Принцип работы следующий:
```text
1. Заявитель создаёт апелляцию в форуме `〢⚖️・суд`, описывая с вердиктом какого судьи он не согласен и почему.
2. Заявитель предоставляет обоснования почему он считает вердикт неверным (субъективная оценка, пропуск аргументов и подобные) и ожидает ответа.
3. Президент совместно с судьёй оценивают дело и, если требуется, уточняют детали.
4. Президент и второй судья выносят свой вердикт, обосновывая мнение.
5. Если за апелляцию выступили два человека (100%), то решение судьи, вынесшего наказание, аннулируется. В другом случае апелляция отклоняется.
```

- 3.19. В случае отказа человек имеет право заполнить **Верховную** апелляцию, которую будут рассматривать администрация проекта.
- 3.20. Верховные апелляции пишутся в тикет (тема - жалобы), где заявитель должен полностью расписать, почему он не согласен с решением прошлой апелляции и вердиктом судьи, предоставить первоначальный вердикт судьи и объяснить само дело, предоставив ветку с обсуждением.
- 3.21. Если Верховная апелляция была отклонена, то любые последующие попытки апелляции приведут к моментальному отказу. 
- 3.22. Никто из должностных лиц первого уровня доступа (Центрат, Президент) не обладает процессуальным иммунитетом. Судья вправе рассматривать иски против них на общих основаниях, оценивая их действия исключительно в рамках действующих правил.

# 4. Президент и законодательство

- 4.1. Президент является главным инициатором правовых и механических изменений на сервере, представляя интересы игроков перед Администрацией.
- 4.2. Президент не может добавить механику без согласия игроков.
- 4.3. Президент работает на основе предложений, которые могут добавить на сервер как и полезную функцию, так и дебаффы для усложнения игры. 
- 4.4. Для подачи предложения президенту необходимо грамотно её заполнить, следуя регламенту.
- 4.4.1. Президент обязан расписать свою идею, предоставив полноценный концепт, понятный с точки зрения орфографии и логики. Не должно быть противоречий, странных формулировок или невнятного текста во избежание недопониманий.
- 4.4.2. Президент обязан заявить о своем законопроекте администрации, предоставив все данные и сведения в канале `〢🏛️・правительство`, упомянув администрацию. Если президент уже является администрацией, то его мнение не учитывается.
- 4.4.3. Администрация выкладывает законопроект в объявление исходя из предоставленных сведений и проводит опрос на 1 день, упоминая "Уведомления о новостях". Вскоре исходя из голосования игроки голосуют за Да/Нет. Если процент голосов "За" больше или равен 67% (2/3) из общего количества голосов, то законопроект одобряется и реализуется администрацией в зависимости от сложности.
- 4.5. Президент имеет кулдаун на предложения. В случае отказа законопроекта администрацией кулдаун на следующий законопроект составляет 12 часов, если же его приняли кулдаун составит 24 часа. 
- 4.6. Президент выступает в роли сопредседателя апелляционной комиссии при рассмотрении Судебных апелляций (совместно со вторым судьей), оценивая правомерность вынесенных вердиктов согласно пункту 3.18.
