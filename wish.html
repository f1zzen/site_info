<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="shortcut icon" type="image/jpg" href="logo.png" />
    <title>...</title>
    <style>
        @font-face{
	        font-family: "cozette";
	        src: url('font/CozetteVector.ttf');
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            font-family: monospace;
        }
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #111;
            color: #fff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            cursor: pointer;
            transition: opacity 0.4s ease;
        }
        #wish-btn {
            padding: 15px 30px;
            font-size: 18px;
            background: #222;
            color: #33ff33;
            border: 2px solid #33ff33;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 4px 4px 0px #33ff33;
            font-family: 'cozette';
        }
        #wish-btn:not([disabled]):active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #33ff33;
        }
        #wish-btn[disabled] {
            color: #555;
            border-color: #555;
            box-shadow: 4px 4px 0px #555;
            cursor: wait;
        }
        #loading-status {
            font-size: 14px;
            color: #666;
            margin-top: 20px;
            font-family: 'cozette';
        }
        video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            object-fit: cover; 
            z-index: 1;
            display: none;
        }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="wish-btn" disabled>Гадаю на волшебной палочке..</button>
        <div id="loading-status">Переворачиваем все карты..</div>
    </div>

    <video id="meme-video" preload="auto">
        <source src="wish.webm" type="video/webm">
        Your browser does not support the video tag.
    </video>

    <script>
        const video = document.getElementById('meme-video');
        const overlay = document.getElementById('overlay');
        const btn = document.getElementById('wish-btn');
        const statusText = document.getElementById('loading-status');
        video.addEventListener('canplaythrough', () => {
            btn.innerText = "ПОЛУЧИТЬ ПРЕДСКАЗАНИЕ!!! ✨";
            btn.removeAttribute('disabled');
            statusText.innerText = "Жми, жми, жми!";
        }, { once: true });
        setTimeout(() => {
            if (btn.hasAttribute('disabled')) {
                btn.innerText = "ПОЛУЧИТЬ ПРЕДСКАЗАНИЕ ✨";
                btn.removeAttribute('disabled');
                statusText.innerText = "Жми, жми, жми!";
            }
        }, 6000);
        overlay.addEventListener('click', () => {
            if (btn.hasAttribute('disabled')) return;
            overlay.style.opacity = '0';
            setTimeout(() => { overlay.style.display = 'none'; }, 400);
            video.style.display = 'block';
            video.muted = false; 
            video.play().catch();
        });
    </script>
</body>
</html>
