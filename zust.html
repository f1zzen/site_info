<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="shortcut icon" type="image/jpg" href="logo.png" />
  <title>Z.UST</title>
  <style>
    @font-face {
      font-family: "cozette";
      src: url('font/CozetteVector.ttf');
    }
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body, html {
      width: 100%;
      height: 100%;
      background-color: #000;
      font-family: 'cozette', monospace;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    .download-btn {
      padding: 15px 30px;
      font-size: 18px;
      background: #222;
      color: #33ff33;
      border: 2px solid #33ff33;
      cursor: pointer;
      font-weight: bold;
      text-transform: uppercase;
      box-shadow: 4px 4px 0px #33ff33;
      text-decoration: none;
      text-align: center;
    }
    .download-btn:active {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0px #33ff33;
    }
    .status-text {
      font-size: 14px;
      color: #666;
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <a href="zust.exe" download="zust.exe" class="download-btn">Скачать Z.UST</a>
  <div class="status-text">Нажми сюда, если Z.UST не скачивается</div>
</body>
</html>
